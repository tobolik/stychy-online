name: Deploy to SFTP

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:  # Ruční spuštění

jobs:
  deploy:
    name: Deploy to SFTP Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove files not for deployment
        run: |
          rm -rf .git .github
          rm -f config/database.php .gitignore

      - name: Deploy via lftp (SFTP mirror)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" sftp://${{ secrets.SFTP_SERVER }}:${{ secrets.SFTP_PORT }} -e "set sftp:auto-confirm yes; mirror -R --verbose --exclude-glob .git* --exclude .github/ --exclude config/database.php ./ '${{ secrets.SFTP_REMOTE_PATH }}'; bye"
