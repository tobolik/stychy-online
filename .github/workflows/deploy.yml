name: Deploy to SFTP

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:  # Ruční spuštění

jobs:
  deploy:
    name: Deploy to SFTP Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove excluded files before deploy
        run: |
          rm -rf .git .github
          rm -f config/database.php README.md .gitignore

      - name: Deploy via lftp
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_SERVER }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USERNAME }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          remoteDir: ${{ secrets.SFTP_REMOTE_PATH }}
          localDir: '.'
          reverse: true
          ignoreFile: '.lftp_ignore'
          options: '--verbose --delete --exclude-glob=.git* --exclude-glob=.github/'
