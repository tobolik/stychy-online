name: Deploy to SFTP

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:  # Ruční spuštění

jobs:
  deploy:
    name: Deploy to SFTP Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove files not for deployment
        run: |
          rm -rf .git .github
          rm -f config/database.php .gitignore

      - name: Deploy via SFTP
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          uploads: |
            ./ => ${{ secrets.SFTP_REMOTE_PATH }}
          ignore: |
            .git*
            .github
            config/database.php
